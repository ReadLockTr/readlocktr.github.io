 <!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReadLock — Referans İstatistikleri</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0B1A3E;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .logo { font-size: 28px; font-weight: 900; letter-spacing: 2px; margin-bottom: 0.25rem; }
  .logo span { color: #7C3AED; }
  .subtitle { font-size: 13px; color: rgba(255,255,255,0.45); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2.5rem; }
  .card { background: #1A2A5E; border-radius: 20px; padding: 2rem; width: 100%; max-width: 420px; border: 1px solid rgba(124,58,237,0.2); }
  .code-badge { display: inline-block; background: rgba(124,58,237,0.2); color: #A78BFA; border: 1px solid rgba(124,58,237,0.4); border-radius: 10px; padding: 6px 16px; font-size: 22px; font-weight: 900; letter-spacing: 3px; margin-bottom: 1.5rem; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  .stat-box { background: rgba(255,255,255,0.05); border-radius: 14px; padding: 1rem; text-align: center; }
  .stat-label { font-size: 11px; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 900; color: #fff; }
  .stat-value.highlight { color: #7C3AED; }
  .stat-value.green { color: #6BCB77; }
  .divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 1.25rem 0; }
  .info-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 6px 0; color: rgba(255,255,255,0.6); }
  .info-row span:last-child { color: #fff; font-weight: 600; }
  .status-badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; }
  .status-active { background: rgba(107,203,119,0.2); color: #6BCB77; }
  .status-expired { background: rgba(255,107,107,0.2); color: #FF6B6B; }
  .loader { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 2rem 0; color: rgba(255,255,255,0.5); font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 3px solid rgba(124,58,237,0.2); border-top-color: #7C3AED; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { text-align: center; padding: 1.5rem; color: rgba(255,255,255,0.5); font-size: 14px; line-height: 1.6; }
  .error-box .emoji { font-size: 36px; margin-bottom: 0.75rem; }
  .footer { margin-top: 2rem; font-size: 12px; color: rgba(255,255,255,0.2); text-align: center; }
  .progress-bar { background: rgba(255,255,255,0.08); border-radius: 100px; height: 8px; margin-top: 8px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 100px; background: #7C3AED; transition: width 0.6s ease; }
</style>
</head>
<body>

<div class="logo">READ<span>LOCK</span></div>
<div class="subtitle">Referans İstatistikleri</div>

<div class="card">
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <span>Yükleniyor...</span>
  </div>
  <div id="content" style="display:none"></div>
</div>

<div class="footer">Bu sayfa yalnızca yetkili içerik üreticileri içindir.</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyBgKxg6oPPXmcK0obl6KEgNhITtIgaCOxk",
    authDomain: "readlock-d2358.firebaseapp.com",
    projectId: "readlock-d2358",
    storageBucket: "readlock-d2358.firebasestorage.app",
    messagingSenderId: "882408167681",
    appId: "1:882408167681:web:94dab26d29a83e28b1a300",
    measurementId: "G-21WGSCPTFG"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const path = window.location.pathname;
  const parts = path.split('/').filter(Boolean);
  const code = (parts[parts.length - 1] || '').toUpperCase();

  async function load() {
    const loader = document.getElementById('loader');
    const content = document.getElementById('content');

    if (!code || code === 'REF' || code === 'INDEX.HTML') {
      loader.innerHTML = '<div class="error-box"><div class="emoji">🔗</div><p>Geçerli bir kupon kodu bulunamadı.<br>Lütfen size gönderilen bağlantıyı kullanın.</p></div>';
      return;
    }

    try {
      const snap = await getDoc(doc(db, 'promoCodes', code));

      if (!snap.exists()) {
        loader.innerHTML = '<div class="error-box"><div class="emoji">❌</div><p>Bu kupon kodu bulunamadı.</p></div>';
        return;
      }

      const d = snap.data();
      const usedCount = d.usedCount || 0;
      const maxUses = d.maxUses || 0;
      const discount = d.discountPct || 0;
      const expiresAt = d.expiresAt?.toDate ? d.expiresAt.toDate() : new Date(d.expiresAt);
      const isActive = d.isActive !== false && expiresAt > new Date();
      const usageType = d.usageType === 'unlimited' ? 'Sınırsız' : d.usageType === 'limited' ? maxUses + ' kullanım' : 'Tek kullanımlık';
      const pct = maxUses > 0 ? Math.min((usedCount / maxUses) * 100, 100) : 0;
      const expireStr = expiresAt.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });

      content.innerHTML =
        '<div class="code-badge">' + code + '</div>' +
        '<div class="stats-grid">' +
          '<div class="stat-box"><div class="stat-label">Toplam Kullanım</div><div class="stat-value highlight">' + usedCount + '</div></div>' +
          '<div class="stat-box"><div class="stat-label">İndirim Oranı</div><div class="stat-value green">%' + discount + '</div></div>' +
        '</div>' +
        (maxUses > 0 ?
          '<div style="margin-bottom:1.25rem">' +
            '<div style="display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:6px"><span>Kullanım durumu</span><span>' + usedCount + ' / ' + maxUses + '</span></div>' +
            '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
          '</div>' : '') +
        '<hr class="divider">' +
        '<div class="info-row"><span>Durum</span><span class="status-badge ' + (isActive ? 'status-active' : 'status-expired') + '">' + (isActive ? 'Aktif' : 'Süresi Doldu') + '</span></div>' +
        '<div class="info-row"><span>Kullanım tipi</span><span>' + usageType + '</span></div>' +
        '<div class="info-row"><span>Son kullanma</span><span>' + expireStr + '</span></div>';

      loader.style.display = 'none';
      content.style.display = 'block';

    } catch(e) {
      loader.innerHTML = '<div class="error-box"><div class="emoji">⚠️</div><p>Veriler yüklenirken hata oluştu.<br>Lütfen daha sonra tekrar deneyin.</p></div>';
    }
  }

  load();
</script>
</body>
</html>
